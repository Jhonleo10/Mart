<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Blue head (left) -->
  <path d="M 120,100 Q 100,100 90,120 L 70,280 Q 65,320 90,360 L 140,380 Q 160,360 180,320 L 200,120 Q 200,100 180,100 Z" fill="#0EA5E9"/>
  
  <!-- Green head (right) -->
  <path d="M 332,100 Q 352,100 362,120 L 382,280 Q 387,320 362,360 L 312,380 Q 292,360 272,320 L 252,120 Q 252,100 272,100 Z" fill="#10B981"/>
  
  <!-- Brain circle (center) -->
  <circle cx="256" cy="200" r="90" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Brain hemispheres -->
  <!-- Left hemisphere -->
  <path d="M 240,130 Q 230,160 230,200 Q 230,240 240,270 L 256,280 L 256,130 Z" fill="#0EA5E9" opacity="0.9"/>
  
  <!-- Right hemisphere -->
  <path d="M 272,130 Q 282,160 282,200 Q 282,240 272,270 L 256,280 L 256,130 Z" fill="#10B981" opacity="0.9"/>
  
  <!-- Brain convolutions (left) -->
  <circle cx="235" cy="170" r="8" fill="#0EA5E9"/>
  <circle cx="245" cy="155" r="6" fill="#0EA5E9"/>
  <circle cx="228" cy="195" r="7" fill="#0EA5E9"/>
  <circle cx="240" cy="215" r="6" fill="#0EA5E9"/>
  
  <!-- Brain convolutions (right) -->
  <circle cx="277" cy="170" r="8" fill="#10B981"/>
  <circle cx="267" cy="155" r="6" fill="#10B981"/>
  <circle cx="284" cy="195" r="7" fill="#10B981"/>
  <circle cx="272" cy="215" r="6" fill="#10B981"/>
  
  <!-- Synaptic connections -->
  <circle cx="235" cy="170" r="3" fill="white"/>
  <circle cx="245" cy="155" r="2.5" fill="white"/>
  <circle cx="228" cy="195" r="2.5" fill="white"/>
  <circle cx="277" cy="170" r="3" fill="white"/>
  <circle cx="267" cy="155" r="2.5" fill="white"/>
  <circle cx="284" cy="195" r="2.5" fill="white"/>
  
  <!-- Center dividing line -->
  <line x1="256" y1="130" x2="256" y2="280" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Crown circle (top) -->
  <circle cx="256" cy="80" r="30" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  <circle cx="256" cy="80" r="25" fill="url(#crownGradient)"/>
  
  <!-- Define gradient -->
  <defs>
    <linearGradient id="crownGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  
  <!-- Decorative circles inside heads -->
  <circle cx="140" cy="180" r="12" fill="white" opacity="0.3"/>
  <circle cx="372" cy="180" r="12" fill="white" opacity="0.3"/>
</svg>
